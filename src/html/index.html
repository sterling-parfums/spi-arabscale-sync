<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPI Dispensing Backoffice</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <h1>SPI Dispensing Backoffice</h1>
      <div class="controls">
        <input id="jobNo" type="text" placeholder="Enter Job No" />
        <button id="searchButton" type="button">Search</button>
      </div>
      <section id="job-header">
        <p class="placeholder">Search for a Job to view its details.</p>
      </section>
    </main>
    <div id="confirmModal" class="modal" hidden>
      <div id="confirmBackdrop" class="modal-backdrop"></div>
      <div
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="confirmTitle"
        aria-describedby="confirmMessage"
      >
        <p id="confirmTitle" class="modal-title">Confirm Schedule</p>
        <p id="confirmMessage" class="modal-message">
          Change this job status to Scheduled?
        </p>
        <div class="modal-actions">
          <button id="confirmCancel" type="button" class="button-secondary">
            Cancel
          </button>
          <button id="confirmApprove" type="button">Schedule</button>
        </div>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
